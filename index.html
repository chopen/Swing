<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Swing · Live P-B-P</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark:   #1A1A1A;
  --orange: #E67E22;
  --red:    #C0392B;
  --yellow: #F1C40F;
  --cream:  #FFF8F0;
  --bg:     #f0f0f0;
}
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: #111; min-height: 100vh; }

/* HEADER */
header {
  background: var(--dark); border-bottom: 3px solid var(--orange);
  padding: 12px 20px; position: sticky; top: 0; z-index: 200;
  display: flex; justify-content: space-between; align-items: center;
}
.h-left .eyebrow { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.12em; color:var(--orange); margin-bottom:2px; }
.h-left .title { font-size:17px; font-weight:800; color:#fff; letter-spacing:-.02em; }
.h-right { text-align:right; }
.live-pill { display:flex; align-items:center; gap:5px; justify-content:flex-end; margin-bottom:3px; }
.ldot { width:7px; height:7px; border-radius:50%; background:var(--red); animation:pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
.lcount { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; color:var(--red); letter-spacing:.06em; }
.htime { font-family:'IBM Plex Mono',monospace; font-size:9px; color:#777; }

/* FILTER BAR */
.fbar { background:#fff; border-bottom:1px solid #e8e8e8; padding:8px 20px; display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.fbtn { background:#f0f0f0; border:none; border-radius:4px; padding:5px 11px; font-size:9px; font-weight:700; font-family:'IBM Plex Mono',monospace; letter-spacing:.04em; color:#666; cursor:pointer; transition:all .15s; }
.fbtn.active { background:var(--orange); color:#fff; }
.fhint { margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:8px; color:#bbb; }
.rbtn { background:var(--dark); border:none; border-radius:4px; padding:5px 11px; font-size:9px; font-weight:700; font-family:'IBM Plex Mono',monospace; color:var(--orange); cursor:pointer; transition:opacity .2s; }
.rbtn:hover { opacity:.75; }
.rbtn.spin { opacity:.4; pointer-events:none; }

/* MAIN */
main { max-width:1300px; margin:0 auto; padding:20px; }
.sec-hdr { display:flex; align-items:center; gap:10px; margin-bottom:12px; margin-top:4px; }
.sec-lbl { font-family:'IBM Plex Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.1em; color:var(--red); display:flex; align-items:center; gap:6px; }
.sec-lbl.pre { color:#aaa; }
.sec-lbl.fin { color:#666; }
.sec-rule { flex:1; height:1px; background:#ddd; }
.game-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; margin-bottom:28px; }

/* GAME CARD */
.gcard {
  background:#fff; border-radius:10px; border:1px solid #e4e4e4;
  overflow:hidden; transition:border-color .3s, box-shadow .3s;
}
.gcard.bluffing { border-color:var(--red); box-shadow:0 0 0 1.5px var(--red); }
.gcard.swing-warning { border-color:var(--yellow); box-shadow:0 0 0 1px var(--yellow); }
.gcard.comeback { border-color:var(--orange); box-shadow:0 0 0 1px var(--orange); }
.gcard.selected { box-shadow:0 4px 24px rgba(0,0,0,.13); }

/* card top bar */
.ctop { padding:6px 12px; background:#f8f8f8; border-bottom:1px solid rgba(0,0,0,.05); display:flex; justify-content:space-between; align-items:center; }
.cleague { font-family:'IBM Plex Mono',monospace; font-size:8px; font-weight:700; letter-spacing:.07em; color:#777; }
.cstatus { font-family:'IBM Plex Mono',monospace; font-size:8px; font-weight:700; }
.cstatus.live { color:var(--red); display:flex; align-items:center; gap:4px; }
.cstatus.pre { color:#aaa; }
.cstatus.fin { color:#555; }

/* score row */
.cscore { padding:11px 14px 8px; }
.srow { display:grid; grid-template-columns:1fr auto 1fr; gap:6px; align-items:center; margin-bottom:9px; }
.tname { font-size:11px; font-weight:800; letter-spacing:.02em; }
.tfull { font-size:8px; color:#999; margin-top:1px; }
.sctr { text-align:center; }
.sdigs { display:flex; align-items:baseline; justify-content:center; gap:4px; }
.snum { font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:800; line-height:1; transition:color .5s; }
.ssep { font-family:'IBM Plex Mono',monospace; font-size:11px; color:#ccc; }
.snet { font-size:8px; color:#bbb; margin-top:1px; }
.stim { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#999; }
.tright { text-align:right; }

/* momentum bars */
.mrow { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.mtrack { flex:1; height:7px; background:#ebebeb; border-radius:4px; overflow:hidden; position:relative; }
.mfill { height:100%; border-radius:4px; transition:width 1.2s ease; opacity:.9; }
.mlbl { min-width:80px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:8px; font-weight:700; letter-spacing:.03em; white-space:nowrap; }
.mvals { display:flex; justify-content:space-between; }
.mval { font-family:'IBM Plex Mono',monospace; font-size:7px; color:#bbb; }

/* momentum chart sparkline */
.chart-wrap {
  padding:0 14px 10px;
  border-top:1px solid #f2f2f2;
  cursor:pointer;
}
.chart-label { font-family:'IBM Plex Mono',monospace; font-size:7px; color:#bbb; letter-spacing:.05em; margin-bottom:4px; padding-top:6px; display:flex; justify-content:space-between; }
.chart-svg { width:100%; height:50px; display:block; }

/* alert strip */
.calert { padding:5px 14px 6px; border-top:1px solid #f5f5f5; font-size:8px; font-style:italic; line-height:1.4; }
.calert.bluff { color:var(--red); }
.calert.comeback { color:var(--orange); }
.calert.warning { color:var(--yellow); }

/* play feed */
.pfeed { display:none; max-height:130px; overflow-y:auto; padding:6px 0; }
.pfeed.expanded { display:block; }
.pfeed::-webkit-scrollbar { width:3px; }
.pfeed::-webkit-scrollbar-thumb { background:#ddd; border-radius:3px; }
.feed-toggle {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 14px; border-top:1px solid #f0f0f0;
  cursor:pointer; user-select:none;
}
.feed-toggle:hover { background:#fafafa; }
.feed-toggle-lbl { font-family:'IBM Plex Mono',monospace; font-size:7px; letter-spacing:.06em; color:#bbb; }
.feed-toggle-arrow { font-size:9px; color:#ccc; transition:transform .2s; display:inline-block; }
.feed-toggle.open .feed-toggle-arrow { transform:rotate(180deg); }
.pitem { display:flex; align-items:flex-start; gap:7px; padding:3px 12px; font-size:8px; line-height:1.4; }
.pitem.fresh { background:#fffde8; }
.ptick { font-family:'IBM Plex Mono',monospace; font-size:7px; color:#bbb; min-width:32px; margin-top:1px; }
.pdot { width:6px; height:6px; border-radius:50%; margin-top:3px; flex-shrink:0; }
.ptext { color:#444; flex:1; }
.ptext .score-tag { font-family:'IBM Plex Mono',monospace; font-size:7px; font-weight:700; }
.pitem.make .ptext { color:#222; font-weight:600; }
.pitem.turnover .ptext { color:var(--red); }

/* card footer */
.cfooter { padding:3px 14px 6px; border-top:1px solid #f8f8f8; }
.cvenue { font-family:'IBM Plex Mono',monospace; font-size:7px; color:#ddd; }

/* empty */
.empty { text-align:center; padding:50px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#bbb; }
.last-upd { font-family:'IBM Plex Mono',monospace; font-size:8px; color:#ccc; text-align:center; padding:10px 0 4px; }

/* LEGEND */
.legend { margin-top:6px; padding:12px 18px; background:var(--cream); border:1px solid var(--orange); border-radius:8px; display:flex; gap:24px; flex-wrap:wrap; align-items:center; }
.leg-title { font-family:'IBM Plex Mono',monospace; font-size:8px; font-weight:700; letter-spacing:.08em; color:var(--orange); }
.leg-item { font-family:'IBM Plex Mono',monospace; font-size:8px; color:#666; }
.leg-item.r { color:var(--red); }
.leg-item.o { color:var(--orange); }
</style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="eyebrow">THE SWING · LIVE PLAY-BY-PLAY MOMENTUM</div>
    <div class="title">NBA + NCAA · Tonight</div>
  </div>
  <div class="h-right">
    <div class="live-pill"><div class="ldot"></div><span class="lcount" id="lcount">0 LIVE</span></div>
    <div class="htime" id="htime">—</div>
  </div>
</header>

<div class="fbar">
  <button class="fbtn active" id="f-ALL" onclick="setFilter('ALL')">ALL</button>
  <button class="fbtn" id="f-LIVE" onclick="setFilter('LIVE')">🔴 LIVE</button>
  <button class="fbtn" id="f-PRE" onclick="setFilter('PRE')">UPCOMING</button>
  <button class="fbtn" id="f-FINAL" onclick="setFilter('FINAL')">FINAL</button>
  <button class="rbtn" id="rbtn" onclick="manualRefresh()">↻ REFRESH</button>
  <span class="fhint">SCORES + P-B-P REFRESH EVERY 20s · MOMENTUM COMPUTED FROM LIVE PLAYS</span>
</div>

<main id="main"></main>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const NBA_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard';
function cbbScoreboardUrl() {
  const d = new Date();
  const ds = d.getFullYear().toString() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
  return `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${ds}&groups=50&limit=200`;
}
const NBA_SUMMARY    = id => `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${id}`;
const CBB_SUMMARY    = id => `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/summary?event=${id}`;
const REFRESH_MS = 20000;
const MAX_CHART_POINTS = 60;
const LIVE_STATUSES = new Set(['STATUS_IN_PROGRESS','STATUS_HALFTIME']);

// ── STATE ────────────────────────────────────────────────────────────────────
let allGames = {};         // id → game object
let currentFilter = 'ALL';
let refreshTimer = null;
let tickCounter = 0;

// ── MOMENTUM ENGINE (PLAY-BY-PLAY) ──────────────────────────────────────────
// Computes rolling momentum from actual play sequence
// Returns { away: 0-100, home: 0-100, chartAway: [], chartHome: [], recentPlays: [] }
function computeMomentumFromPlays(plays, awayAbbr, homeAbbr, awayId, homeId) {
  if (!plays || plays.length === 0) return null;

  // Build a resolver: plays use team.id in CBB, team.abbreviation in NBA
  // Support both by checking id first, then abbreviation
  function resolveTeam(playTeam) {
    if (!playTeam) return null;
    if (awayId && playTeam.id === String(awayId)) return awayAbbr;
    if (homeId && playTeam.id === String(homeId)) return homeAbbr;
    if (playTeam.abbreviation === awayAbbr) return awayAbbr;
    if (playTeam.abbreviation === homeAbbr) return homeAbbr;
    return null;
  }

  const WINDOW = 12; // possession-level sliding window
  const weights = {
    make3:  3.0,  miss3: -1.2,
    make2:  2.0,  miss2: -0.8,
    makeFT: 0.8,  missFT: -0.4,
    turnover: -2.5,
    steal:  1.8,
    block:  1.2,
    offReb: 1.5,
    defReb: 0.6,
    foul:  -0.3,
    fastBreak: 2.5,
  };

  // Score each play for a team
  function scorePossession(play) {
    const text = (play.text || '').toLowerCase();
    const type = (play.type?.text || '').toLowerCase();
    const val   = play.scoreValue || 0;
    const isMake = text.includes('makes') || text.includes('make');
    const isMiss = text.includes('misses') || text.includes('miss');
    const isShooting = play.shootingPlay;

    let score = 0;

    if (isShooting) {
      if (val === 3) score = isMake ? weights.make3 : weights.miss3;
      else if (val === 2) score = isMake ? weights.make2 : weights.miss2;
      else if (val === 1) score = isMake ? weights.makeFT : weights.missFT;
    }

    // Turnovers
    if (type.includes('turnover') || text.includes('turnover') || text.includes('bad pass') || text.includes('lost ball')) {
      score += weights.turnover;
    }

    // Steals
    if (type.includes('steal') || text.includes('steal')) score += weights.steal;

    // Blocks
    if (type.includes('block') || text.includes('block')) score += weights.block;

    // Rebounds
    if (type.includes('rebound') || text.includes('rebound')) {
      if (text.includes('offensive')) score += weights.offReb;
      else score += weights.defReb;
    }

    // Fast break
    if (text.includes('fast break') || text.includes('fastbreak')) score += weights.fastBreak;

    // Unsustainable 3PT discount: if text has 3-pointer made and we're in a hot streak
    // handled implicitly by the window

    return score;
  }

  // Filter plays that are attributable to a team
  const teamedPlays = plays.filter(p => resolveTeam(p.team));

  // Build time series of team scores
  const chartAway = [];
  const chartHome = [];

  // Sliding window computation
  let awayWindow = [];
  let homeWindow = [];

  teamedPlays.forEach((play, i) => {
    const team = resolveTeam(play.team);
    const ps = scorePossession(play);
    if (ps === 0 && !play.shootingPlay && !(play.type?.text || '').toLowerCase().includes('rebound') && 
        !(play.type?.text || '').toLowerCase().includes('turnover') && 
        !(play.type?.text || '').toLowerCase().includes('steal')) return;

    if (team === awayAbbr) {
      awayWindow.push(ps);
      if (awayWindow.length > WINDOW) awayWindow.shift();
    } else if (team === homeAbbr) {
      homeWindow.push(ps);
      if (homeWindow.length > WINDOW) homeWindow.shift();
    }

    // Sample chart every ~5 plays
    if (i % 5 === 0) {
      const rawAway = awayWindow.reduce((a,b)=>a+b,0);
      const rawHome = homeWindow.reduce((a,b)=>a+b,0);
      // normalize to 0-100
      const awayM = toMomentum(rawAway);
      const homeM = toMomentum(rawHome);
      chartAway.push({ t: play.wallclock, p: play.period?.number, c: play.clock?.displayValue, v: awayM, hs: play.homeScore, as: play.awayScore });
      chartHome.push({ t: play.wallclock, p: play.period?.number, c: play.clock?.displayValue, v: homeM });
    }
  });

  // Final momentum = last window
  const rawAway = awayWindow.reduce((a,b)=>a+b,0);
  const rawHome = homeWindow.reduce((a,b)=>a+b,0);
  const awayM = toMomentum(rawAway);
  const homeM = toMomentum(rawHome);

  // Trim chart to MAX_CHART_POINTS (evenly sampled)
  function trimChart(arr) {
    if (arr.length <= MAX_CHART_POINTS) return arr;
    const step = arr.length / MAX_CHART_POINTS;
    return Array.from({length: MAX_CHART_POINTS}, (_,i) => arr[Math.floor(i * step)]);
  }

  // Last 8 plays for feed (most recent first)
  const recentPlays = teamedPlays.slice(-8).reverse().map(p => ({
    clock: p.clock?.displayValue,
    period: p.period?.number,
    text: p.text || '',
    team: resolveTeam(p.team),
    type: p.type?.text || '',
    isMake: (p.text||'').toLowerCase().includes('makes'),
    isTurnover: (p.type?.text||'').toLowerCase().includes('turnover') || (p.text||'').toLowerCase().includes('turnover'),
    homeScore: p.homeScore,
    awayScore: p.awayScore,
    scoreValue: p.scoreValue
  }));

  return {
    away: awayM, home: homeM,
    chartAway: trimChart(chartAway),
    chartHome: trimChart(chartHome),
    recentPlays
  };
}

function toMomentum(raw) {
  // Map [-15, +15] → [5, 95]
  const clamped = Math.max(-15, Math.min(15, raw));
  return Math.round(5 + ((clamped + 15) / 30) * 90);
}

// ── DATA FETCHING ────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now());
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function loadScoreboards() {
  const [nba, cbb] = await Promise.all([
    fetchJSON(NBA_SCOREBOARD).catch(()=>({events:[]})),
    fetchJSON(cbbScoreboardUrl()).catch(()=>({events:[]})),
  ]);
  const events = [
    ...(nba.events||[]).map(e=>({...e, league:'NBA'})),
    ...(cbb.events||[]).map(e=>({...e, league:'CBB'})),
  ];
  return events;
}

async function loadGameDetail(gameId, league) {
  const url = league === 'NBA' ? NBA_SUMMARY(gameId) : CBB_SUMMARY(gameId);
  return fetchJSON(url).catch(()=>null);
}

function parseScoreboard(event) {
  const comp  = event.competitions?.[0];
  const home  = comp?.competitors?.find(c=>c.homeAway==='home');
  const away  = comp?.competitors?.find(c=>c.homeAway==='away');
  const status = event.status?.type?.name;
  return {
    id:       event.id,
    league:   event.league,
    name:     event.name,
    shortName: event.shortName,
    status,
    period:   event.status?.period,
    clock:    event.status?.displayClock,
    date:     event.date,
    awayAbbr: away?.team?.abbreviation || '???',
    homeAbbr: home?.team?.abbreviation || '???',
    awayId:   away?.team?.id || null,
    homeId:   home?.team?.id || null,
    awayName: away?.team?.displayName  || '',
    homeName: home?.team?.displayName  || '',
    awayColor:'#'+(away?.team?.color   ||'555555'),
    homeColor:'#'+(home?.team?.color   ||'555555'),
    awayScore: parseInt(away?.score||0),
    homeScore: parseInt(home?.score||0),
    network:  comp?.broadcasts?.[0]?.names?.[0] || comp?.broadcasts?.[0]?.media?.shortName || '',
    venue:    comp?.venue ? `${comp.venue.fullName||''}, ${comp.venue.address?.city||''}`.replace(/, $/,'') : '',
    // momentum (filled in later)
    mom: null,
  };
}

// ── BLUFF / COMEBACK / SWING WARNING DETECTION ──────────────────────────────
function detectAlerts(game) {
  if (!game.mom) return { bluffing:false, comeback:false, swingWarning:false };
  const { away, home } = game.mom;
  const swingGap = Math.abs(away - home);
  const scoreDiff = game.awayScore - game.homeScore;
  const awayLeadsScore = scoreDiff > 0;
  const awayLeadsSwing = away > home;
  const isLive = LIVE_STATUSES.has(game.status);
  const isHT = game.status === 'STATUS_HALFTIME';

  const bluffMomThresh   = isHT ? 4 : 10;
  const bluffScoreThresh = isHT ? 2 : 4;
  const comebackMomLead  = isHT ? 4 : 6;
  const comebackScoreGap = isHT ? 3 : 5;

  const bluffing = isLive
    && swingGap >= bluffMomThresh && Math.abs(scoreDiff) >= bluffScoreThresh
    && awayLeadsScore !== awayLeadsSwing;

  const trailingLeadsSwing = scoreDiff > 0 ? home > away + comebackMomLead : away > home + comebackMomLead;
  const comeback = isLive && !bluffing
    && Math.abs(scoreDiff) >= comebackScoreGap && trailingLeadsSwing;

  const swingWarning = isLive && !bluffing && !comeback
    && Math.abs(scoreDiff) < bluffScoreThresh && swingGap >= 35;

  return { bluffing, comeback, swingWarning };
}

// ── MAIN LOAD LOOP ───────────────────────────────────────────────────────────
async function loadAll() {
  tickCounter++;
  const events = await loadScoreboards();

  // Sort: live → upcoming → final
  const sortOrder = { STATUS_IN_PROGRESS:0, STATUS_HALFTIME:0, STATUS_SCHEDULED:1, STATUS_FINAL:2 };
  events.sort((a,b)=>(sortOrder[a.status?.type?.name]??3)-(sortOrder[b.status?.type?.name]??3));

  // For live & recently-finished games, fetch play-by-play
  const detailPromises = events.map(async e => {
    const g = parseScoreboard(e);
    const prev = allGames[g.id];

    // HALFTIME FREEZE: don't re-fetch during halftime — lock first-half snapshot
    if (g.status === 'STATUS_HALFTIME' && prev?.mom) {
      g.mom = prev.mom;
      const alerts = detectAlerts(g);
      g.bluffing = alerts.bluffing;
      g.comeback = alerts.comeback;
      g.swingWarning = alerts.swingWarning;
      allGames[g.id] = g;
      return g;
    }

    const needDetail = LIVE_STATUSES.has(g.status) ||
                       (g.status === 'STATUS_FINAL' && g.period >= 2);
    if (needDetail) {
      const detail = await loadGameDetail(g.id, g.league);
      if (detail?.plays?.length) {
        g.mom = computeMomentumFromPlays(detail.plays, g.awayAbbr, g.homeAbbr, g.awayId, g.homeId);
        if (prev?.mom?.chartAway?.length > (g.mom?.chartAway?.length || 0)) {
          g.mom.chartAway = prev.mom.chartAway;
          g.mom.chartHome = prev.mom.chartHome;
        }
      }
    }
    const alerts = detectAlerts(g);
    g.bluffing = alerts.bluffing;
    g.comeback = alerts.comeback;
    g.swingWarning = alerts.swingWarning;
    allGames[g.id] = g;
    return g;
  });

  await Promise.all(detailPromises);
  render();
  updateHeader();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f)?.classList.add('active');
  render();
}

function getFiltered() {
  const all = Object.values(allGames);
  if (currentFilter === 'LIVE')  return all.filter(g=>LIVE_STATUSES.has(g.status));
  if (currentFilter === 'PRE')   return all.filter(g=>g.status==='STATUS_SCHEDULED');
  if (currentFilter === 'FINAL') return all.filter(g=>g.status==='STATUS_FINAL');
  return all;
}

function periodLabel(p) {
  if (!p) return '';
  if (p===1) return '1st'; if (p===2) return '2nd';
  if (p===3) return '3rd'; if (p===4) return '4th';
  return `OT${p>5?p-4:''}`;
}

function formatTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/New_York'})+' ET';
}

function swingLabelHTML(away, home, awayAbbr, homeAbbr, awayColor, homeColor) {
  const gap = Math.abs(away-home);
  if (gap <= 8) return `<span style="color:#aaa">EVEN</span>`;
  const leader = away > home ? awayAbbr : homeAbbr;
  const color  = away > home ? awayColor : homeColor;
  return `<span style="color:${color};font-weight:800">${leader} SWING</span>`;
}

function buildSparkline(chartAway, chartHome, awayColor, homeColor, awayAbbr, homeAbbr) {
  if (!chartAway || chartAway.length < 2) return '';
  const W = 300, H = 50;
  const n = Math.min(chartAway.length, chartHome.length);
  const pts = Array.from({length:n},(_,i)=>i);

  function toX(i) { return (i/(n-1))*(W-4)+2; }
  function toY(v) { return H - 4 - ((v-5)/90)*(H-8); }

  const pathA = pts.map((i,j)=>(j===0?'M':'L')+toX(i).toFixed(1)+' '+toY(chartAway[i].v).toFixed(1)).join(' ');
  const pathH = pts.map((i,j)=>(j===0?'M':'L')+toX(i).toFixed(1)+' '+toY(chartHome[i].v).toFixed(1)).join(' ');

  // midline at 50
  const midY = toY(50).toFixed(1);

  return `
  <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="0" y1="${midY}" x2="${W}" y2="${midY}" stroke="#eee" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="${pathA}" fill="none" stroke="${awayColor}" stroke-width="1.8" opacity="0.85"/>
    <path d="${pathH}" fill="none" stroke="${homeColor}" stroke-width="1.8" opacity="0.85"/>
    <circle cx="${toX(n-1).toFixed(1)}" cy="${toY(chartAway[n-1].v).toFixed(1)}" r="3" fill="${awayColor}"/>
    <circle cx="${toX(n-1).toFixed(1)}" cy="${toY(chartHome[n-1].v).toFixed(1)}" r="3" fill="${homeColor}"/>
  </svg>`;
}

function buildPlayFeed(plays, awayAbbr, homeAbbr, awayColor, homeColor) {
  if (!plays || plays.length === 0) return '';
  return plays.map((p, i) => {
    const color = p.team === awayAbbr ? awayColor : homeColor;
    const cls = p.isMake ? 'make' : p.isTurnover ? 'turnover' : '';
    const scoreTag = (p.homeScore !== undefined && p.awayScore !== undefined)
      ? `<span class="score-tag">[${p.awayScore}–${p.homeScore}]</span> ` : '';
    const text = p.text.replace(/\n/g,' ').trim();
    return `<div class="pitem ${cls} ${i===0?'fresh':''}">
      <span class="ptick">${p.clock||''}</span>
      <span class="pdot" style="background:${color}"></span>
      <span class="ptext">${scoreTag}${text}</span>
    </div>`;
  }).join('');
}

function renderCard(g) {
  const isLive  = LIVE_STATUSES.has(g.status);
  const isFinal = g.status === 'STATUS_FINAL';
  const isPre   = g.status === 'STATUS_SCHEDULED';
  const hasMom  = !!g.mom;
  const clockDisplay = g.status === 'STATUS_HALFTIME' ? 'HALFTIME' : g.clock;

  // Status badge
  let statusHTML = '';
  if (isLive) {
    statusHTML = `<span class="cstatus live"><span class="ldot"></span>${periodLabel(g.period)} · ${clockDisplay}</span>`;
  } else if (isFinal) {
    statusHTML = `<span class="cstatus fin">FINAL</span>`;
  } else {
    statusHTML = `<span class="cstatus pre">${formatTime(g.date)}</span>`;
  }

  // Score coloring
  const aWin = g.awayScore > g.homeScore, hWin = g.homeScore > g.awayScore;
  const aColor = (isLive||isFinal) ? (aWin?g.awayColor:'#ccc') : '#ccc';
  const hColor = (isLive||isFinal) ? (hWin?g.homeColor:'#ccc') : '#ccc';

  // Score center
  let scoreCenter = '';
  if (isLive||isFinal) {
    scoreCenter = `<div class="sdigs">
      <span class="snum" style="color:${aColor}">${g.awayScore}</span>
      <span class="ssep">–</span>
      <span class="snum" style="color:${hColor}">${g.homeScore}</span>
    </div><div class="snet">${g.network}</div>`;
  } else {
    scoreCenter = `<div class="stim">${formatTime(g.date)}</div><div class="snet">${g.network}</div>`;
  }

  // Momentum section
  let momSection = '';
  if (hasMom) {
    const { away, home, chartAway, chartHome, recentPlays } = g.mom;
    momSection = `
      <div class="cscore" style="padding-top:0;padding-bottom:6px">
        <div class="mrow">
          <div class="mtrack"><div class="mfill" style="width:${away}%;background:${g.awayColor}"></div></div>
          <div class="mlbl">${swingLabelHTML(away,home,g.awayAbbr,g.homeAbbr,g.awayColor,g.homeColor)}</div>
          <div class="mtrack"><div class="mfill" style="width:${home}%;background:${g.homeColor};float:right"></div></div>
        </div>
        <div class="mvals"><span class="mval">${away}</span><span class="mval">${home}</span></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-label">
          <span style="color:${g.awayColor}">${g.awayAbbr}</span>
          <span>MOMENTUM CHART</span>
          <span style="color:${g.homeColor}">${g.homeAbbr}</span>
        </div>
        ${buildSparkline(chartAway, chartHome, g.awayColor, g.homeColor, g.awayAbbr, g.homeAbbr)}
      </div>`;

    if (recentPlays && recentPlays.length > 0) {
      const fid = 'feed-' + g.id;
      momSection += `<div class="feed-toggle" data-feedid="${fid}"><span class="feed-toggle-lbl">▸ PLAY FEED</span><span class="feed-toggle-arrow">▾</span></div>`;
      momSection += `<div class="pfeed" id="${fid}">${buildPlayFeed(recentPlays, g.awayAbbr, g.homeAbbr, g.awayColor, g.homeColor)}</div>`;
    }
  } else if (isPre) {
    momSection = `<div style="padding:6px 14px 10px">
      <div style="height:7px;background:#f0f0f0;border-radius:4px;opacity:.5;margin-bottom:5px"></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:7px;color:#ccc;text-align:center">MOMENTUM ACTIVATES AT TIP-OFF</div>
    </div>`;
  }

  // Alert strip
  let alertHTML = '';
  const htTag = g.status === 'STATUS_HALFTIME' ? ' <span style="font-size:7px;opacity:.7;font-style:normal">· FULL HALF OF DATA</span>' : '';
  if (g.bluffing) {
    const sLeader = g.awayScore > g.homeScore ? g.awayAbbr : g.homeAbbr;
    const mLeader = g.mom.away > g.mom.home ? g.awayAbbr : g.homeAbbr;
    alertHTML = `<div class="calert bluff">⚡ SCORE IS BLUFFING — ${sLeader} leads score, ${mLeader} leads The Swing${htTag}</div>`;
  } else if (g.comeback) {
    const trailing = g.awayScore < g.homeScore ? g.awayAbbr : g.homeAbbr;
    alertHTML = `<div class="calert comeback">👀 COMEBACK WATCH — ${trailing} trails score but leads momentum${htTag}</div>`;
  } else if (g.swingWarning) {
    const swingLeader = g.mom.away > g.mom.home ? g.awayAbbr : g.homeAbbr;
    alertHTML = `<div class="calert warning">⚠️ SWING WARNING — score is close but ${swingLeader} owns the momentum${htTag}</div>`;
  }

  // Card class
  const cls = ['gcard', g.bluffing?'bluffing':'', g.comeback?'comeback':'', g.swingWarning?'swing-warning':''].filter(Boolean).join(' ');

  return `<div class="${cls}" id="card-${g.id}">
    <div class="ctop">
      <span class="cleague">${g.league} · ${g.shortName||g.name}</span>
      ${statusHTML}
    </div>
    <div class="cscore">
      <div class="srow">
        <div>
          <div class="tname" style="color:${g.awayColor}">${g.awayAbbr}</div>
          <div class="tfull">${g.awayName}</div>
        </div>
        <div class="sctr">${scoreCenter}</div>
        <div class="tright">
          <div class="tname" style="color:${g.homeColor}">${g.homeAbbr}</div>
          <div class="tfull">${g.homeName}</div>
        </div>
      </div>
    </div>
    ${momSection}
    ${alertHTML}
    <div class="cfooter"><span class="cvenue">${g.venue}</span></div>
  </div>`;
}

function render() {
  const filtered = getFiltered();
  const live  = filtered.filter(g=>LIVE_STATUSES.has(g.status));
  const pre   = filtered.filter(g=>g.status==='STATUS_SCHEDULED');
  const final = filtered.filter(g=>g.status==='STATUS_FINAL');
  const all   = Object.values(allGames);

  // Update filter counts
  document.getElementById('f-ALL').textContent   = `ALL (${all.length})`;
  document.getElementById('f-LIVE').textContent  = `🔴 LIVE (${all.filter(g=>LIVE_STATUSES.has(g.status)).length})`;
  document.getElementById('f-PRE').textContent   = `UPCOMING (${all.filter(g=>g.status==='STATUS_SCHEDULED').length})`;
  document.getElementById('f-FINAL').textContent = `FINAL (${all.filter(g=>g.status==='STATUS_FINAL').length})`;

  let html = '';

  if (filtered.length === 0) {
    html = '<div class="empty">NO GAMES IN THIS FILTER</div>';
  } else {
    if (live.length > 0) {
      html += `<div class="sec-hdr"><div class="sec-lbl"><span class="ldot"></span> IN PROGRESS</div><div class="sec-rule"></div></div>
               <div class="game-grid">${live.map(renderCard).join('')}</div>`;
    }
    if (pre.length > 0) {
      html += `<div class="sec-hdr"><div class="sec-lbl pre">UPCOMING TONIGHT</div><div class="sec-rule"></div></div>
               <div class="game-grid">${pre.map(renderCard).join('')}</div>`;
    }
    if (final.length > 0) {
      html += `<div class="sec-hdr"><div class="sec-lbl fin">FINAL</div><div class="sec-rule"></div></div>
               <div class="game-grid">${final.map(renderCard).join('')}</div>`;
    }
  }

  html += `<div class="last-upd" id="last-upd">—</div>
  <div class="legend">
    <span class="leg-title">THE SWING · HOW TO READ</span>
    <span class="leg-item">MOMENTUM 0–100 PER TEAM · COMPUTED FROM LIVE PLAYS</span>
    <span class="leg-item">MOMENTUM ≠ SCORE — process, not outcome</span>
    <span class="leg-item r">⚡ SCORE IS BLUFFING = score & momentum clearly disagree</span>
    <span class="leg-item o">👀 COMEBACK WATCH = trailing team dominates momentum</span>
    <span class="leg-item" style="color:var(--yellow)">⚠️ SWING WARNING = tied/close score, momentum heavily one-sided</span>
    <span class="leg-item">CHART = momentum timeline · plays feed below</span>
  </div>`;

  document.getElementById('main').innerHTML = html;
  wireFeedToggles();

  const ts = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
  const el = document.getElementById('last-upd');
  if (el) el.textContent = `Last updated: ${ts} · Tick #${tickCounter}`;
}

function updateHeader() {
  const n = Object.values(allGames).filter(g=>LIVE_STATUSES.has(g.status)).length;
  document.getElementById('lcount').textContent = `${n} LIVE`;
  const now = new Date();
  const t = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  const d = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  document.getElementById('htime').textContent = `${t} · ${d}`;
}

async function manualRefresh() {
  const btn = document.getElementById('rbtn');
  btn.textContent = '↻ LOADING…'; btn.classList.add('spin');
  await loadAll();
  btn.textContent = '↻ REFRESH'; btn.classList.remove('spin');
}

// ── FEED TOGGLE ─────────────────────────────────────────────────────────────
const openFeeds = new Set();

function wireFeedToggles() {
  document.querySelectorAll('.feed-toggle').forEach(toggle => {
    toggle.onclick = null;
    toggle.onclick = function() {
      const fid = toggle.dataset.feedid;
      const feed = document.getElementById(fid);
      if (!feed) return;
      const isOpen = feed.classList.toggle('expanded');
      toggle.classList.toggle('open', isOpen);
      const lbl = toggle.querySelector('.feed-toggle-lbl');
      if (lbl) lbl.textContent = (isOpen ? '\u25be' : '\u25b8') + ' PLAY FEED';
      if (isOpen) openFeeds.add(fid); else openFeeds.delete(fid);
    };
  });
  openFeeds.forEach(fid => {
    const feed = document.getElementById(fid);
    if (!feed) return;
    feed.classList.add('expanded');
    const toggle = document.querySelector('[data-feedid="'+fid+'"]');
    if (toggle) {
      toggle.classList.add('open');
      const lbl = toggle.querySelector('.feed-toggle-lbl');
      if (lbl) lbl.textContent = '\u25be PLAY FEED';
    }
  });
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
updateHeader();
document.getElementById('main').innerHTML = '<div class="empty">Loading The Swing…</div>';
loadAll();
refreshTimer = setInterval(loadAll, REFRESH_MS);
setInterval(updateHeader, 30000);
</script>
